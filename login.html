<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: #fff;
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .login-card h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 1.75rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.35rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      font-size: 0.95rem;
      color: #111827;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .error-message {
      color: #dc2626;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      display: none;
    }

    .login-btn {
      width: 100%;
      padding: 0.65rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background-color: #2563eb;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.15s;
      margin-top: 0.5rem;
    }

    .login-btn:hover {
      background-color: #1d4ed8;
    }

    .login-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Admin Login</h1>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <p class="error-message" id="errorMsg"></p>

      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "http://supabasekong-z4ubyi6sde90skdns63ar6ny.187.127.140.202.sslip.io:8000";
    const SUPABASE_ANON_KEY = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc3NTU5MDYyMCwiZXhwIjo0OTMxMjY0MjIwLCJyb2xlIjoiYW5vbiJ9.GGX81v5y36I7s4qcCcemquoNsJrsUbWuHjhv2J5Luuw";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");

    // If already logged in, go to dashboard
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = "dashboard.html";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.style.display = "none";
      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = "block";
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";
        return;
      }

      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
